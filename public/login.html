<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AttendEase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Global Loader -->
  <div class="loader-overlay" id="global-loader">
    <div class="spinner"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo.png" alt="AttendEase Logo" style="width: 80px; height: 80px; object-fit: contain;">
      </div>
      <h1>AttendEase</h1>
      <p>Modern Attendance Management</p>
      <p>Developed by Vipul Meshram</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary">
          Sign In <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      const user = getUser();
      if (user) {
        if (user.role === 'admin') window.location.href = '/admin-dashboard.html';
        if (user.role === 'teacher') window.location.href = '/teacher-dashboard.html';
      }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          showLoader();
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error || 'Login failed');
          }

          // Save auth info
          setAuth(data.token, data.user);
          showToast('Login successful!');

          // Redirect
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = '/admin-dashboard.html';
            } else {
              window.location.href = '/teacher-dashboard.html';
            }
          }, 500);

        } catch (error) {
          hideLoader();
          showToast(error.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
